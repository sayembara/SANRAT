<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Funding Ops</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.15); }
        body { margin: 0; padding: 40px; font-family: 'Inter', sans-serif; background: radial-gradient(circle at top right, #1a1a2e, #0f0c29); color: white; display: flex; flex-direction: column; align-items: center; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 900px; width: 100%; margin-bottom: 40px; }
        .card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
        input, select { background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: white; width: calc(100% - 26px); margin-bottom: 15px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; color: white; }
        .btn-normal { background: #6dd5ed; color: #00334e; }
        .btn-boost { background: #ff4b2b; }
        .sensor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; max-width: 900px; }
        .sensor-box { background: rgba(0, 255, 204, 0.05); border: 1px solid rgba(0, 255, 204, 0.2); padding: 15px; border-radius: 12px; text-align: center; }
        .sensor-val { font-family: monospace; font-size: 1.1rem; color: #00ffcc; }
    </style>
</head>
<body>
    <h1>FUNDING OPERATIONS (tBNB)</h1>
    <div class="container">
        <div class="card">
            <h2>🔋 Normal Refill</h2>
            <p style="font-size:0.8rem; color:#aaa;">Distributes equally to all 12 Round Buckets.</p>
            <input type="number" id="normalAmount" placeholder="Amount tBNB" step="0.1">
            <button class="btn-normal" onclick="executeFund('normal')">Execute Normal Fund</button>
        </div>

        <div class="card">
            <h2>🚀 Boost Injection</h2>
            <p style="font-size:0.8rem; color:#aaa;">Inject directly into a specific Round Bucket.</p>
            <select id="boostTarget"></select>
            <input type="number" id="boostAmount" placeholder="Amount tBNB" step="0.01">
            <button class="btn-boost" onclick="executeFund('boost')">Execute Boost Fund</button>
        </div>
    </div>

    <div class="sensor-grid" id="sensorGrid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", authDomain: "nuclearf1-94a6b.firebaseapp.com", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "nuclearf1-94a6b" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Setup UI
        const grid = document.getElementById('sensorGrid');
        const select = document.getElementById('boostTarget');
        for (let i = 1; i <= 12; i++) {
            grid.innerHTML += `<div class="sensor-box"><div style="font-size:0.7rem;color:#888;">ROUND ${i}</div><div class="sensor-val" id="r${i}-val">0.00</div></div>`;
            select.innerHTML += `<option value="r${i}">Round ${i}</option>`;
        }

        // Sync Buckets
        onValue(ref(db, 'vault/rounds'), (snap) => {
            const d = snap.val() || {};
            for (let i = 1; i <= 12; i++) document.getElementById(`r${i}-val`).innerText = parseFloat(d[`r${i}`] || 0).toFixed(3);
        });

        window.executeFund = async function(type) {
            const amt = parseFloat(document.getElementById(type + 'Amount').value);
            if (!amt || amt <= 0) return alert("Enter valid amount");

            const snap = await get(ref(db, 'vault/rounds'));
            let data = snap.val() || {};
            const updates = {};

            if (type === 'normal') {
                const share = amt / 12;
                for (let i = 1; i <= 12; i++) {
                    const current = parseFloat(data[`r${i}`] || 0);
                    updates[`vault/rounds/r${i}`] = parseFloat((current + share).toFixed(3));
                }
            } else {
                const target = document.getElementById('boostTarget').value;
                const current = parseFloat(data[target] || 0);
                updates[`vault/rounds/${target}`] = parseFloat((current + amt).toFixed(3));
            }

            update(ref(db), updates).then(() => alert("Fund Injected Successfully!"));
        };
    </script>
</body>
</html>

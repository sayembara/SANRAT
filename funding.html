<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANRAT | Sponsor Command</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --boost-color: #ff4b2b;
            --refill-color: #6dd5ed;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1a1a2e, #0f0c29);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            max-width: 900px;
            width: 100%;
            margin-bottom: 40px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        input, select {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 10px;
            color: white;
            width: calc(100% - 26px);
            margin-bottom: 15px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-exe { background: var(--boost-color); color: white; }
        .btn-exe:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .sensor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            max-width: 900px;
            width: 100%;
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .sensor-box {
            background: rgba(0, 255, 204, 0.05);
            border: 1px solid rgba(0, 255, 204, 0.2);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .sensor-val { font-family: monospace; font-size: 1.1rem; color: #00ffcc; }
        .overflow-display { margin: 20px 0; font-size: 1.5rem; color: #ffcc00; font-family: monospace; }
    </style>
</head>
<body>

    <h1>FUNDING COMMAND</h1>
    
    <div class="overflow-display">
        AVAILABLE OVERFLOW: <span id="master-overflow">0.000</span> tBNB
    </div>

    <div class="container">
        <div class="card">
            <h2>Reallocate Funds</h2>
            <p style="font-size: 0.8rem; color: #aaa;">Move tBNB from Overflow to a specific Round Bucket.</p>
            
            <label>Select Target Round:</label>
            <select id="targetRound">
                </select>

            <label>Amount to Move:</label>
            <input type="number" id="moveAmount" placeholder="0.00" step="0.01">
            
            <button class="btn-exe" onclick="reallocate()">Execute Real-Time Move</button>
        </div>
    </div>

    <div class="sensor-grid" id="sensorGrid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4",
            authDomain: "nuclearf1-94a6b.firebaseapp.com",
            databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "nuclearf1-94a6b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. Setup UI
        const select = document.getElementById('targetRound');
        const grid = document.getElementById('sensorGrid');
        for (let i = 1; i <= 12; i++) {
            select.innerHTML += `<option value="r${i}">Round ${i}</option>`;
            grid.innerHTML += `
                <div class="sensor-box">
                    <div style="font-size: 0.7rem; color: #888;">ROUND ${i}</div>
                    <div class="sensor-val" id="r${i}-val">0.00</div>
                </div>`;
        }

        // 2. Real-Time Sync
        onValue(ref(db, 'vault'), (snapshot) => {
            const data = snapshot.val() || {};
            const rounds = data.rounds || {};
            const overflow = data.overflow || 0;

            document.getElementById('master-overflow').innerText = parseFloat(overflow).toFixed(3);
            for (let i = 1; i <= 12; i++) {
                document.getElementById(`r${i}-val`).innerText = parseFloat(rounds[`r${i}`] || 0).toFixed(3);
            }
        });

        // 3. Reallocation Execution
        window.reallocate = async function() {
            const target = document.getElementById('targetRound').value;
            const amount = parseFloat(document.getElementById('moveAmount').value);

            if (!amount || amount <= 0) return alert("Enter valid amount");

            // Fetch latest data to prevent race conditions
            const snap = await get(ref(db, 'vault'));
            const data = snap.val() || {};
            const currentOverflow = parseFloat(data.overflow || 0);
            const currentRoundVal = parseFloat(data.rounds?.[target] || 0);

            if (amount > currentOverflow) {
                return alert("Insufficient Overflow Balance!");
            }

            // Calculate New Totals
            const newOverflow = (currentOverflow - amount).toFixed(3);
            const newRoundVal = (currentRoundVal + amount).toFixed(3);

            // Update Firebase Directly
            const updates = {};
            updates['vault/overflow'] = parseFloat(newOverflow);
            updates[`vault/rounds/${target}`] = parseFloat(newRoundVal);

            update(ref(db), updates)
                .then(() => {
                    alert(`SUCCESS: Moved ${amount} tBNB to ${target.toUpperCase()}`);
                    document.getElementById('moveAmount').value = '';
                })
                .catch(err => alert("Error: " + err.message));
        };
    </script>
</body>
</html>

<div id="terminal-container" style="background:#000; color:#f3ba2f; font-family:monospace; padding:30px; border:1px solid #333; text-align:center; max-width:400px; margin:auto;">
    <h2 style="letter-spacing:3px;">SANRAT_VAULT_v2</h2>
    
    <button id="connectBtn" onclick="window.manualConnect()" style="width:100%; padding:15px; margin:10px 0; background:#f3ba2f; color:#000; font-weight:bold; border:none; cursor:pointer; display:block;">1. CONNECT PILOT</button>
    
    <button id="depositBtn" onclick="window.manualDeposit()" disabled style="width:100%; padding:15px; margin:10px 0; background:#222; color:#444; font-weight:bold; border:none; cursor:pointer; display:block;">2. DEPOSIT 0.01 tBNB</button>
    
    <div id="status-bar" style="background:#111; padding:10px; margin-top:20px; border:1px solid #222; font-size:0.8em;">// SYSTEM_IDLE //</div>
</div>

<script>
(function() {
    const MASTER_WALLET = "0xce9782f77ec560a1cb329f935b5d416aa41f1a5d".toLowerCase();
    const contractAddress = "0xb436c8C192288F45ca154081aa6c04b867c1946C";
    const abi = ["function payEntranceFee() external payable"];
    let signer, contract;

    function updateStatus(msg) {
        const el = document.getElementById('status-bar');
        if (el) el.innerText = "// " + msg + " //";
    }

    // Backup "Manual" connection for DashNex
    window.manualConnect = async function() {
        console.log("Button clicked!");
        if (typeof window.ethereum === 'undefined') {
            alert("MetaMask not detected! Please open your wallet.");
            return;
        }

        try {
            updateStatus("LINKING...");
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            const userAddr = accounts[0].toLowerCase();

            if (userAddr !== MASTER_WALLET) {
                alert("UNAUTHORIZED: Switch to ...1a5d");
                return;
            }

            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const { chainId } = await provider.getNetwork();
            
            if (chainId !== 97) {
                alert("Switch MetaMask to BNB Testnet!");
                return;
            }

            signer = provider.getSigner();
            contract = new ethers.Contract(contractAddress, abi, signer);

            // Update UI
            const cBtn = document.getElementById('connectBtn');
            const dBtn = document.getElementById('depositBtn');
            if (cBtn) {
                cBtn.innerText = "LINK_ACTIVE";
                cBtn.style.background = "#2ecc71";
            }
            if (dBtn) {
                dBtn.disabled = false;
                dBtn.style.background = "#f3ba2f";
                dBtn.style.color = "#000";
            }
            updateStatus("SYSTEM_READY");
        } catch (e) {
            console.error(e);
            updateStatus("AUTH_FAILED");
        }
    };

    window.manualDeposit = async function() {
        if (!contract) return;
        try {
            updateStatus("SENDING...");
            const tx = await contract.payEntranceFee({ value: ethers.utils.parseEther("0.01") });
            updateStatus("AWAITING_BLOCK...");
            await tx.wait();
            updateStatus("SUCCESS_DEPOSITED");
        } catch (e) {
            updateStatus("TX_FAILED");
        }
    };

    // Also try to bind the button automatically as a third backup
    window.addEventListener('load', function() {
        const b = document.getElementById('connectBtn');
        if (b) b.onclick = window.manualConnect;
    });
})();
</script>

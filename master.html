<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Global Constants</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0e14; color: white; padding: 40px; }
        .config-container { max-width: 800px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid #333; }
        .group { margin-bottom: 25px; padding: 20px; border: 1px solid #444; border-radius: 10px; }
        label { display: block; margin-bottom: 10px; color: #00ffcc; font-weight: bold; }
        input { background: #000; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; width: 80px; }
        button { background: #00ffcc; color: #0b0e14; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8rem; }
        th, td { border: 1px solid #333; padding: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="config-container">
    <h1>Global Physics & Constants</h1>
    
    <div class="group">
        <label>Core Fatigue/Healing Multiplier (Core/20)</label>
        <table>
            <tr><th>Core Level</th><th>HP Impact / Day</th></tr>
            <tr><td>1</td><td>± 0.05%</td></tr>
            <tr><td>10</td><td>± 0.50%</td></tr>
        </table>
    </div>

    <div class="group">
        <label>HP Drain Range (Support Cars)</label>
        <input type="number" id="drainMin" step="0.1"> % to <input type="number" id="drainMax" step="0.1"> %
        <button onclick="save('drain')">Update Drain</button>
    </div>

    <div class="group">
        <label>HP Heal Range (Resting Cars)</label>
        <input type="number" id="healMin" step="0.1"> % to <input type="number" id="healMax" step="0.1"> %
        <button onclick="save('heal')">Update Heal</button>
    </div>

    <div class="group">
        <label>Winner Penalty Logic (Round 2+)</label>
        <p style="font-size:0.8rem; color:#888;">If Winner Propulsion 1-5 → Day 1/3 Terrain = Straight.<br>If Winner Traction 1-5 → Day 1/3 Weather = 100% Rain.</p>
    </div>

    <button style="background: #ff4b2b; color: white; width: 100%;" onclick="window.location.href='master.html'">Back to Master Engine</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'race_constants/hp_settings'), snap => {
        const data = snap.val();
        if (data) {
            document.getElementById('drainMin').value = data.drain.min;
            document.getElementById('drainMax').value = data.drain.max;
            document.getElementById('healMin').value = data.heal.min;
            document.getElementById('healMax').value = data.heal.max;
        }
    });

    window.save = async (type) => {
        const min = parseFloat(document.getElementById(`${type}Min`).value);
        const max = parseFloat(document.getElementById(`${type}Max`).value);
        const updates = {};
        updates[`race_constants/hp_settings/${type}`] = { min, max };
        await update(ref(db), updates);
        alert("Constants Updated!");
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Master Engine</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; --gold: #ffcc00; --danger: #ff4b2b; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: #0b0e14; color: white; display: flex; flex-direction: column; align-items: center; }
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .btn-connect { background: #f6851b; color: white; padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; }
        #admin-ui { display: none; width: 100%; max-width: 900px; flex-direction: column; gap: 20px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; }
        .btn-master { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        input, select { background: #000; color: white; border: 1px solid #444; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box; margin-top: 10px; }
        .log-box { background: #000; border: 1px solid #333; padding: 15px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 0.75rem; color: #888; border-radius: 8px; margin-top: 10px; }
        .track-lane { position: relative; width: 100%; height: 20px; border-bottom: 1px solid #222; }
        .track-car { position: absolute; height: 12px; width: 20px; background: var(--accent); border-radius: 2px; top: 4px; font-size: 0.5rem; text-align: center; color: black; line-height: 12px; font-weight: bold; transition: 1s linear; }
    </style>
</head>
<body>
    <div id="auth-screen">
        <h1 style="letter-spacing: 4px;">MASTER ENGINE</h1>
        <button class="btn-connect" id="connectBtn">Connect MetaMask</button>
    </div>

    <div id="admin-ui">
        <div class="card">
            <h3 style="margin:0;">SYSTEM STATE</h3>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-master" style="background:var(--accent); color:#00334e;" onclick="toggleRace(true)">GO LIVE</button>
                <button class="btn-master" style="background:var(--danger); color:white;" onclick="toggleRace(false)">STOP RACE</button>
                <button class="btn-master" style="background:#444; color:white;" onclick="triggerTick()">TRIGGER DAILY TICK</button>
            </div>
        </div>

        <div class="card">
            <h3>7-DAY WEATHER SEQUENCE</h3>
            <div id="weatherRow" style="display: flex; gap: 8px;"></div>
        </div>

        <div class="card">
            <h3>DISTRIBUTION PANEL</h3>
            <select id="targetTeam">
                <option value="Alpha">Alpha Team</option>
                <option value="Beta">Beta Team</option>
                <option value="Gamma">Gamma Team</option>
                <option value="Delta">Delta Team</option>
                <option value="Epsilon">Epsilon Team</option>
            </select>
            <input type="number" id="distAmount" value="0.50" step="0.01">
            <button class="btn-master" style="background:var(--gold); color:black; width:100%; margin-top:10px;" onclick="distribute()">TRANSFER TO TEAM BALANCE</button>
        </div>

        <div class="card">
            <h3>MASTER TRACK VIEW</h3>
            <div id="track-box" style="background:#000; height:200px; position:relative; overflow:hidden; border-radius:8px;">
                <div id="master-layer"></div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin:0;">SYSTEM LOGS</h3>
            <div id="logs" class="log-box">> Initialized.</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, update, onValue, get, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const ADMIN = "0xCe9782f77eC560a1Cb329F935b5D416AA41f1a5d".toLowerCase();
        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accs[0].toLowerCase() === ADMIN) {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('admin-ui').style.display = 'flex';
                    initMaster();
                } else { alert("Not Whitelisted"); }
            }
        };

        function initMaster() {
            onValue(ref(db, 'race_constants/weather'), (snap) => {
                const w = snap.val() || [];
                document.getElementById('weatherRow').innerHTML = w.map((v, i) => `<div style="flex:1; background:rgba(255,255,255,0.05); padding:10px; border-radius:5px; text-align:center; font-size:0.7rem;">D${i+1}<br><b>${v}</b></div>`).join('');
            });

            onValue(ref(db, 'cars'), (snap) => {
                const layer = document.getElementById('master-layer');
                layer.innerHTML = '';
                const sorted = Object.values(snap.val() || {}).sort((a,b) => (b.total_dist || 0) - (a.total_dist || 0)).slice(0, 10);
                sorted.forEach(c => {
                    const p = (c.total_dist || 0) / 1500 * 100;
                    layer.innerHTML += `<div class="track-lane"><div class="track-car" style="left:${p}%">${c.id}</div></div>`;
                });
            });
        }

        window.toggleRace = (live) => {
            update(ref(db, 'master_state'), { isLive: live, label: live ? "RACING LIVE" : "OFFLINE" });
            addLog(`Race status: ${live ? 'LIVE' : 'OFFLINE'}`);
        };

        window.distribute = async () => {
            const team = document.getElementById('targetTeam').value;
            const amt = parseFloat(document.getElementById('distAmount').value);
            if(confirm(`Send ${amt} tBNB to ${team}?`)) {
                const snap = await get(ref(db, `balances/${team}`));
                await set(ref(db, `balances/${team}`), (snap.val() || 0) + amt);
                addLog(`✅ Transferred ${amt} to ${team}`);
            }
        };

        window.triggerTick = async () => {
            if(!confirm("Start Daily Calculation?")) return;
            const [cSnap, carsSnap, sSnap] = await Promise.all([get(ref(db, 'race_constants')), get(ref(db, 'cars')), get(ref(db, 'race_state'))]);
            const constants = cSnap.val();
            const cars = carsSnap.val();
            const raceState = sSnap.val() || { day_in_round: 1 };
            const dayKey = `day${raceState.day_in_round}`;
            const updates = {};
            
            Object.keys(cars).forEach(k => {
                const t = cars[k].traits;
                const r = () => (1 - (Math.floor(Math.random() * (constants.limits.l2 - constants.limits.l1 + 1)) + constants.limits.l1) / 100);
                const d = (constants.traits.propulsion.straight[t.propulsion-1] + constants.traits.traction.dry[t.traction-1] + constants.traits.stability.flat[t.stability-1]) * r();
                updates[`cars/${k}/daily_dist/${dayKey}`] = d;
                updates[`cars/${k}/total_dist`] = (cars[k].total_dist || 0) + d;
            });
            
            let nextDay = raceState.day_in_round + 1;
            updates[`race_state/day_in_round`] = nextDay > 7 ? 1 : nextDay;
            await update(ref(db), updates);
            addLog(`✅ Calculation for Day ${raceState.day_in_round} finished.`);
        };

        function addLog(m) { const l = document.getElementById('logs'); l.innerHTML += `<div>> [${new Date().toLocaleTimeString()}] ${m}</div>`; l.scrollTop = l.scrollHeight; }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Master Race Control</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: #050510; color: white; display: flex; flex-direction: column; align-items: center; }
        .master-header { text-align: center; margin-bottom: 30px; border: 1px solid var(--accent); padding: 20px; border-radius: 20px; background: rgba(0, 255, 204, 0.05); width: 100%; max-width: 900px; }
        .round-display { font-size: 3rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 20px rgba(0, 255, 204, 0.4); }
        .btn-force { background: var(--accent); color: #00334e; padding: 15px 40px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; font-size: 1.1rem; margin-top: 15px; }
        
        .sensor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 100%; max-width: 900px; }
        .sensor-box { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; text-align: center; transition: 0.3s; }
        .active-round { border: 2px solid var(--accent); box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); transform: scale(1.05); background: rgba(0, 255, 204, 0.1); }
        .past-round { opacity: 0.25; filter: grayscale(1); }
        .total-amt { font-size: 1.3rem; color: var(--accent); font-weight: bold; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px; }
        .sub-amt { font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <div class="master-header">
        <h1>MASTER RACE CONTROL</h1>
        <div class="round-display">ROUND <span id="round-num">1</span></div>
        <button class="btn-force" id="nextRoundBtn">NEXT ROUND (FORCE RUN)</button>
        <p style="color: #666; font-size: 0.8rem; margin-top: 10px;">Clicking this syncs active status across all Admin & Sponsor panels.</p>
    </div>

    <div class="sensor-grid" id="sensorGrid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", 
            databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // SYNC ROUND AND BUCKETS
        onValue(ref(db), (snap) => {
            const data = snap.val() || {};
            const curRound = data.race_data?.current_round || 1;
            const vault = data.vault || {};
            
            document.getElementById('round-num').innerText = curRound;
            const grid = document.getElementById('sensorGrid');
            grid.innerHTML = '';

            for(let i=1; i<=12; i++) {
                let r = vault.rounds?.[`r${i}`] || { normal: 0, boost: 0 };
                if (typeof r === 'number') r = { normal: r, boost: 0 };
                
                let extraClass = i < curRound ? 'past-round' : (i === curRound ? 'active-round' : '');
                const total = (parseFloat(r.normal || 0) + parseFloat(r.boost || 0)).toFixed(3);

                grid.innerHTML += `
                    <div class="sensor-box ${extraClass}">
                        <div style="font-size:0.7rem;color:#aaa;">ROUND ${i} ${i === curRound ? '⚡' : ''}</div>
                        <div class="sub-amt">N: ${parseFloat(r.normal).toFixed(2)}</div>
                        <div class="sub-amt">B: ${parseFloat(r.boost).toFixed(2)}</div>
                        <div class="total-amt">${total}</div>
                    </div>`;
            }
        });

        // FORCE RUN NEXT ROUND
        document.getElementById('nextRoundBtn').onclick = async () => {
            const snap = await get(ref(db, 'race_data/current_round'));
            let current = snap.val() || 1;
            if (current >= 12) {
                if(confirm("Race finished. Reset to Round 1?")) {
                    update(ref(db, 'race_data'), { current_round: 1 });
                }
            } else {
                update(ref(db, 'race_data'), { current_round: current + 1 });
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Master Control</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; --gold: #ffcc00; --danger: #ff4b2b; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: #0b0e14; color: white; display: flex; flex-direction: column; align-items: center; }
        
        #admin-ui { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 20px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 25px; }
        
        .status-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .offline { background: var(--danger); }

        .btn-master { padding: 15px 25px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-live { background: var(--accent); color: #00334e; }
        .btn-stop { background: var(--danger); color: white; }
        .btn-fund { background: var(--gold); color: black; }
        
        input, select { background: #000; color: white; border: 1px solid #444; padding: 10px; border-radius: 5px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        .log-box { background: #000; border: 1px solid #333; padding: 15px; height: 150px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; color: #888; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="admin-ui">
        <div class="card">
            <div class="status-header">
                <h2>RACE ENGINE CONTROL</h2>
                <div>
                    <span id="status-dot" class="status-dot offline"></span>
                    <span id="status-text" style="font-weight: bold; color: #888;">OFFLINE</span>
                </div>
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <button class="btn-master btn-live" onclick="toggleRace(true)">GO LIVE</button>
                <button class="btn-master btn-stop" onclick="toggleRace(false)">STOP RACE</button>
                <button class="btn-master" style="background:#444; color:white;" onclick="triggerDailyCalculation()">TRIGGER DAILY TICK</button>
            </div>
        </div>

        <div class="card">
            <h3>FINANCIAL DISTRIBUTION</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label>Target Team/Wallet</label>
                    <input type="text" id="targetId" placeholder="e.g., Alpha or 0x...">
                </div>
                <div>
                    <label>Amount (tBNB)</label>
                    <input type="number" id="transferAmount" step="0.01" value="0.10">
                </div>
            </div>
            <button class="btn-master btn-fund" style="width: 100%; margin-top: 15px;" onclick="transferFunds()">TRANSFER FUNDS TO TARGET</button>
            <p style="font-size: 0.7rem; color: #666; margin-top: 10px;">*Note: This adds to the "Claimable Balance" of the target in the database.</p>
        </div>

        <div class="card">
            <h3>ENGINE LOGS</h3>
            <div id="logs" class="log-box">> System initialized...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, update, onValue, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Sync UI with Firebase
        onValue(ref(db, 'master_state'), (snap) => {
            const state = snap.val() || { isLive: false, label: "OFFLINE" };
            const dot = document.getElementById('status-dot');
            const txt = document.getElementById('status-text');
            
            if(state.isLive) {
                dot.className = "status-dot online";
                txt.innerText = state.label;
                txt.style.color = "var(--accent)";
            } else {
                dot.className = "status-dot offline";
                txt.innerText = "OFFLINE";
                txt.style.color = "#888";
            }
        });

        window.toggleRace = (isLive) => {
            const label = isLive ? "RACING LIVE" : "OFFLINE";
            if(confirm(`Set Race to ${label}?`)) {
                update(ref(db, 'master_state'), { isLive, label });
                addLog(`Race status changed to ${label}`);
            }
        };

        window.transferFunds = async () => {
            const target = document.getElementById('targetId').value;
            const amount = parseFloat(document.getElementById('transferAmount').value);
            
            if(!target || isNaN(amount)) return alert("Invalid target or amount");
            
            if(confirm(`Transfer ${amount} tBNB to ${target}?`)) {
                addLog(`Processing transfer to ${target}...`);
                // In a real scenario, this would update a 'balances' node in Firebase
                // for the specific team or wallet.
                addLog(`✅ Transfer of ${amount} to ${target} completed in DB.`);
            }
        };

        // THE CALCULATION ENGINE (Daily Tick)
        window.triggerDailyCalculation = async () => {
            if(!confirm("Are you sure you want to trigger the Daily Movement? All cars will calculate distance for the current day.")) return;
            
            addLog("Fetching current constants and car data...");
            const constantsSnap = await get(ref(db, 'race_constants'));
            const carsSnap = await get(ref(db, 'cars'));
            const stateSnap = await get(ref(db, 'race_state'));

            const constants = constantsSnap.val();
            const cars = carsSnap.val();
            const raceState = stateSnap.val() || { day_in_round: 1 };
            const dayKey = `day${raceState.day_in_round}`;

            const updates = {};
            const L1 = constants.limits.l1;
            const L2 = constants.limits.l2;
            const getR = () => (1 - (Math.floor(Math.random() * (L2 - L1 + 1)) + L1) / 100);

            addLog(`Calculating distances for Day ${raceState.day_in_round}...`);

            Object.keys(cars).forEach(key => {
                const car = cars[key];
                const t = car.traits;

                // Simple test logic (using Straight/Dry/Flatland by default for this mock)
                const a1 = constants.traits.propulsion.straight[t.propulsion - 1] * getR();
                const a2 = constants.traits.traction.dry[t.traction - 1] * getR();
                const a3 = constants.traits.stability.flat[t.stability - 1] * getR();
                
                let a4 = 0;
                const cutoff = constants.traits.core.cutoff[t.core - 1];
                const dice = Math.floor(Math.random() * 100) + 1;
                if(dice > cutoff) {
                    a4 = constants.traits.core.impact[t.core - 1] * getR();
                }

                const dailyTotal = (a1 + a2 + a3) * (1 - a4/100);
                const newTotal = (car.total_dist || 0) + dailyTotal;

                updates[`cars/${key}/daily_dist/${dayKey}`] = dailyTotal;
                updates[`cars/${key}/total_dist`] = newTotal;
            });

            // Increment Day
            let nextDay = raceState.day_in_round + 1;
            if(nextDay > 7) nextDay = 1; // Reset to day 1 (start new round)
            updates[`race_state/day_in_round`] = nextDay;

            await update(ref(db), updates);
            addLog("✅ Daily Tick Complete. Cars moved.");
        };

        function addLog(msg) {
            const box = document.getElementById('logs');
            box.innerHTML += `<div>> [${new Date().toLocaleTimeString()}] ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>

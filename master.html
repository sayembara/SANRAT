<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MASTER_PILOT_CONTROL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #000; color: #e74c3c; font-family: 'Courier New', monospace; display: flex; justify-content: center; padding: 20px; }
        .terminal { background: #080808; border: 1px solid #e74c3c; padding: 25px; width: 450px; border-radius: 8px; box-shadow: 0 0 15px rgba(231, 76, 60, 0.2); }
        .stat-box { background: #111; border: 1px solid #333; padding: 12px; margin: 10px 0; font-size: 0.85em; }
        .live-val { color: #fff; font-weight: bold; float: right; }
        input { width: 94%; padding: 10px; margin: 5px 0; background: #111; border: 1px solid #e74c3c; color: #fff; border-radius: 4px; }
        button { width: 100%; padding: 12px; margin: 5px 0; background: #e74c3c; color: #fff; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px; }
        button:hover { background: #fff; color: #e74c3c; }
        #controls { display: none; margin-top: 20px; border-top: 1px dashed #e74c3c; padding-top: 20px; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="text-align:center; letter-spacing: 5px;">MASTER_V2</h2>
    <button id="connectMasterBtn">AUTHENTICATE MASTER</button>

    <div id="controls">
        <div class="stat-box">HOUSE_FUNDS <span class="live-val" id="houseFunds">0</span></div>
        <div class="stat-box">SET_PRIZE <span class="live-val" id="currentPrize">0</span></div>
        <div class="stat-box">MIN_CARS_REQ <span class="live-val" id="minCars">0</span></div>
        <div class="stat-box" style="border-color: #2ecc71;">LOBBY_COUNT <span class="live-val" id="carCount">0</span></div>
        <div class="stat-box" style="color: #f3ba2f;">WINNER: <span id="winnerDisplay">none</span></div>

        <hr style="border: 0.5px dashed #333; margin: 20px 0;">

        <input type="number" id="depositAmt" placeholder="Add tBNB to House">
        <button id="addFundsBtn">DEPOSIT TO HOUSE</button>

        <input type="number" id="prizeInp" placeholder="New Prize Amount">
        <button id="setPrizeBtn">SET PRIZE AMOUNT</button>

        <input type="number" id="minInp" placeholder="New Min Cars">
        <button id="setMinCarsBtn">SET MIN CARS</button>

        <button id="pickWinnerBtn" style="background:#f3ba2f; color:#000">RANDOMIZE WINNER</button>
        
        <button id="startBtn" style="background:#2ecc71; color:#000">RESET FOR NEXT ROUND</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, updateDoc, onSnapshot, getDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { /* PASTE YOUR CONFIG */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const MASTER_WALLET = "0xce9782f77ec560a1cb329f935b5d416aa41f1a5d".toLowerCase();
    const statsRef = doc(db, "vault", "stats");

    document.getElementById('connectMasterBtn').onclick = async () => {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        if (accounts[0].toLowerCase() === MASTER_WALLET) {
            document.getElementById('controls').style.display = "block";
            document.getElementById('connectMasterBtn').style.display = "none";
            startListener();
        } else { alert("WRONG WALLET"); }
    };

    function startListener() {
        onSnapshot(statsRef, (d) => {
            const s = d.data();
            document.getElementById('houseFunds').innerText = s.totalFunds + " tBNB";
            document.getElementById('currentPrize').innerText = s.prizeAmount + " tBNB";
            document.getElementById('carCount').innerText = s.carCount;
            document.getElementById('minCars').innerText = s.minCars;
            document.getElementById('winnerDisplay').innerText = s.winner;
        });
    }

    // UPDATE BUTTONS
    document.getElementById('addFundsBtn').onclick = async () => {
        const val = parseFloat(document.getElementById('depositAmt').value);
        const snap = await getDoc(statsRef);
        await updateDoc(statsRef, { totalFunds: (snap.data().totalFunds || 0) + val });
        document.getElementById('depositAmt').value = "";
    };

    document.getElementById('setPrizeBtn').onclick = async () => {
        const val = parseFloat(document.getElementById('prizeInp').value);
        const snap = await getDoc(statsRef);
        if (snap.data().totalFunds < val) return alert("Low Funds!");
        await updateDoc(statsRef, { 
            prizeAmount: val, 
            totalFunds: Number((snap.data().totalFunds - val).toFixed(4)) 
        });
        document.getElementById('prizeInp').value = "";
    };

    document.getElementById('setMinCarsBtn').onclick = async () => {
        const val = parseInt(document.getElementById('minInp').value);
        await updateDoc(statsRef, { minCars: val });
        document.getElementById('minInp').value = "";
    };

    // RANDOM WINNER LOGIC
    document.getElementById('pickWinnerBtn').onclick = async () => {
        const snap = await getDoc(statsRef);
        const currentRound = snap.data().currentRound || 1;
        
        // Find everyone who paid for this specific round
        const q = query(collection(db, "registrations"), where("lastPaidRound", "==", currentRound));
        const querySnapshot = await getDocs(q);
        
        let players = [];
        querySnapshot.forEach((doc) => { players.push(doc.id); });

        if (players.length === 0) return alert("No players registered yet!");

        const winner = players[Math.floor(Math.random() * players.length)];
        await updateDoc(statsRef, { winner: winner });
        alert("Winner Picked: " + winner);
    };

    document.getElementById('startBtn').onclick = async () => {
        const snap = await getDoc(statsRef);
        const nextRound = (snap.data().currentRound || 1) + 1;
        await updateDoc(statsRef, { winner: "none", carCount: 0, currentRound: nextRound });
        alert("Round " + nextRound + " started!");
    };
</script>
</body>
</html>

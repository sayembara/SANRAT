<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Master Ops</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; --danger: #ff4b2b; --gold: #ffcc00; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: #050510; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; text-align: center; }
        .btn-connect { background: #f6851b; color: white; padding: 15px 30px; font-size: 1.2rem; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; }
        
        #master-ui { display: none; width: 100%; max-width: 900px; flex-direction: column; align-items: center; gap: 20px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 25px; width: 100%; box-sizing: border-box; text-align: center; }
        
        /* Header & Stats */
        .overflow-display { font-size: 1rem; color: var(--gold); letter-spacing: 1px; margin-bottom: 10px; font-family: monospace; }
        .season-tag { font-size: 1rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .round-display { font-size: 3.5rem; font-weight: 900; color: var(--accent); margin: 5px 0; }
        
        /* Buttons */
        .controls { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
        button { padding: 12px 24px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .btn-force { background: var(--accent); color: #00334e; }
        .btn-reset { background: rgba(255,255,255,0.1); color: #fff; }
        
        /* Grid */
        .sensor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 100%; }
        .sensor-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; text-align: center; }
        .active-round { border: 2px solid var(--accent); background: rgba(0, 255, 204, 0.1); }
        .past-round { opacity: 0.25; filter: grayscale(1); }
        
        /* History */
        #transition-log { text-align: left; max-height: 200px; overflow-y: auto; font-size: 0.8rem; }
        .log-entry { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 8px 0; display: flex; justify-content: space-between; color: var(--gold); }

        /* Danger Zone */
        .danger-zone { border: 1px dashed var(--danger); background: rgba(255, 75, 43, 0.05); margin-top: 20px; }
        .btn-hard-wipe { background: var(--danger); color: white; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1>MASTER ACCESS</h1>
        <button class="btn-connect" id="connectBtn">Connect MetaMask</button>
        <p id="auth-error" style="color: var(--danger); margin-top: 20px;"></p>
    </div>

    <div id="master-ui">
        <div class="card">
            <div class="overflow-display">VAULT OVERFLOW: <span id="master-overflow">0.000</span> tBNB</div>
            <div class="season-tag">Season <span id="season-num">1</span></div>
            <div class="round-display">ROUND <span id="round-num">1</span></div>
            <div class="controls">
                <button class="btn-force" id="nextRoundBtn">NEXT ROUND</button>
                <button class="btn-reset" id="resetRoundBtn">RESET TO R1</button>
            </div>
        </div>

        <div class="sensor-grid" id="sensorGrid"></div>

        <div class="card" style="text-align: left;">
            <h4 style="margin:0 0 10px 0; color:#888;">SEASON TRANSITION HISTORY</h4>
            <div id="log-content"><i>No records...</i></div>
        </div>

        <div class="card danger-zone">
            <h4 style="margin:0; color: var(--danger);">DANGER ZONE</h4>
            <p style="font-size: 0.75rem; color: #aaa;">Hard Reset: Purges history and resets race to Season 1 Round 1.</p>
            <button class="btn-hard-wipe" id="hardWipeBtn">🚨 EXECUTE HARD WIPE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get, remove, push } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const WHITELISTED_ADMIN = "0xCe9782f77eC560a1Cb329F935b5D416AA41f1a5d".toLowerCase(); 
        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accounts[0].toLowerCase() === WHITELISTED_ADMIN) {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('master-ui').style.display = 'flex';
                    initMaster();
                } else { document.getElementById('auth-error').innerText = "Access Denied."; }
            }
        };

        function initMaster() {
            onValue(ref(db), (snap) => {
                const data = snap.val() || {};
                const race = data.race_data || { current_round: 1, current_season: 1 };
                const vault = data.vault || {};
                const history = data.history?.transitions || {};
                
                document.getElementById('round-num').innerText = race.current_round;
                document.getElementById('season-num').innerText = race.current_season;
                document.getElementById('master-overflow').innerText = parseFloat(vault.overflow || 0).toFixed(3);
                
                const grid = document.getElementById('sensorGrid');
                grid.innerHTML = '';
                for(let i=1; i<=12; i++) {
                    let r = vault.rounds?.[`r${i}`] || { normal: 0, boost: 0 };
                    let extraClass = i < race.current_round ? 'past-round' : (i === race.current_round ? 'active-round' : '');
                    grid.innerHTML += `<div class="sensor-box ${extraClass}">
                        <div style="font-size:0.7rem;color:#888;">RD ${i}</div>
                        <div style="font-size:0.7rem; color:#666;">N:${parseFloat(r.normal||0).toFixed(2)} | B:${parseFloat(r.boost||0).toFixed(2)}</div>
                        <div style="font-size:1rem; font-weight:bold; color:var(--accent);">${(parseFloat(r.normal||0)+parseFloat(r.boost||0)).toFixed(3)}</div>
                    </div>`;
                }

                const logBox = document.getElementById('log-content');
                const entries = Object.values(history).reverse();
                logBox.innerHTML = entries.length > 0 ? entries.map(e => `
                    <div class="log-entry">
                        <span><b>S${e.from_season}➔S${e.to_season}</b>: Used ${e.moved_from_overflow} tBNB</span>
                        <span style="color:#555;">${e.timestamp}</span>
                    </div>`).join('') : '<i>No records...</i>';
            });

            async function triggerSeasonTransition(oldSeason) {
                const snap = await get(ref(db));
                const data = snap.val() || {};
                const limits = data.master_settings?.limits || { min: 0.1, max: 2.0 };
                const oldVault = data.vault || {};
                
                let currentOverflow = parseFloat(oldVault.overflow || 0);
                let startOverflow = currentOverflow;
                let newRounds = {};
                let finalStateRecord = {};

                for(let i=1; i<=12; i++) {
                    let r = oldVault.rounds?.[`r${i}`] || { normal: 0, boost: 0 };
                    finalStateRecord[`r${i}`] = { normal: r.normal, boost: r.boost, total: (parseFloat(r.normal) + parseFloat(r.boost)).toFixed(3) };

                    newRounds[`r${i}`] = { normal: 0, boost: 0 };
                    let fillAmt = Math.min(currentOverflow, limits.max);
                    newRounds[`r${i}`].normal = parseFloat(fillAmt.toFixed(3));
                    currentOverflow -= fillAmt; // REDUCE OVERFLOW
                }

                const historyEntry = {
                    from_season: oldSeason,
                    to_season: oldSeason + 1,
                    moved_from_overflow: (startOverflow - currentOverflow).toFixed(3),
                    final_vault_state: finalStateRecord,
                    timestamp: new Date().toLocaleString()
                };

                await push(ref(db, 'history/transitions'), historyEntry);
                await update(ref(db, 'race_data'), { current_round: 1, current_season: oldSeason + 1 });
                await update(ref(db, 'vault'), { rounds: newRounds, overflow: parseFloat(currentOverflow.toFixed(3)) });
            }

            document.getElementById('nextRoundBtn').onclick = async () => {
                const snap = await get(ref(db, 'race_data'));
                const race = snap.val() || { current_round: 1, current_season: 1 };
                if (race.current_round >= 12) {
                    if(confirm("Season complete. Roll over to Season " + (race.current_season + 1) + "?")) {
                        triggerSeasonTransition(race.current_season);
                    }
                } else {
                    update(ref(db, 'race_data'), { current_round: race.current_round + 1 });
                }
            };

            document.getElementById('hardWipeBtn').onclick = async () => {
                const pass = prompt("Enter MASTER PASSWORD:");
                if (pass !== "ADMIN123") return alert("Denied.");
                
                const snap = await get(ref(db));
                const data = snap.val() || {};
                const limits = data.master_settings?.limits || { min: 0.1, max: 2.0 };
                
                let totalPool = parseFloat(data.vault?.overflow || 0);
                if(data.vault?.rounds) {
                    Object.values(data.vault.rounds).forEach(r => {
                        totalPool += (parseFloat(r.normal || 0) + parseFloat(r.boost || 0));
                    });
                }

                let remaining = totalPool;
                let newRounds = {};
                for(let i=1; i<=12; i++) {
                    let fill = Math.min(remaining, limits.max);
                    newRounds[`r${i}`] = { normal: parseFloat(fill.toFixed(3)), boost: 0 };
                    remaining -= fill;
                }

                await remove(ref(db, 'history'));
                await update(ref(db, 'race_data'), { current_round: 1, current_season: 1 });
                await update(ref(db, 'vault'), { rounds: newRounds, overflow: parseFloat(remaining.toFixed(3)) });
                alert("System Reset.");
            };

            document.getElementById('resetRoundBtn').onclick = () => {
                if(confirm("Reset to Round 1?")) update(ref(db, 'race_data'), { current_round: 1 });
            };
        }
    </script>
</body>
</html>

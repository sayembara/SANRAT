<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Master Control</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; --gold: #ffcc00; --danger: #ff4b2b; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: #0b0e14; color: white; display: flex; flex-direction: column; align-items: center; }
        #admin-ui { width: 100%; max-width: 1200px; display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; }
        .full-width { grid-column: 1 / -1; }
        
        .status-tag { background: var(--accent); color: #000; padding: 4px 12px; border-radius: 4px; font-weight: bold; }
        .btn-master { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-right: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.75rem; }
        th, td { border: 1px solid #333; padding: 8px; text-align: center; }
        th { background: rgba(255,255,255,0.05); color: var(--accent); }
        .cur-day { background: var(--danger) !important; color: white; }

        /* Track & Animations */
        .track-box { background: #000; height: 350px; position: relative; border-radius: 10px; border: 1px solid #444; overflow: hidden; }
        .marker-1000 { position: absolute; left: 50%; top: 0; bottom: 0; border-left: 2px dashed rgba(255,255,255,0.2); z-index: 1; }
        .track-lane { position: relative; width: 100%; height: 32px; border-bottom: 1px solid #222; }
        
        .track-car { 
            position: absolute; height: 20px; width: 35px; border-radius: 4px; top: 6px; 
            font-size: 0.6rem; color: black; font-weight: 900; text-align: center; line-height: 20px; 
            transition: left 2s ease-in-out; z-index: 2; 
        }
        .track-car.hero { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
        .track-car.support { background: var(--accent); }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        .low-hp { animation: blink 0.5s infinite; border: 2px solid white; }

        .hp-bar-bg { width: 100%; height: 4px; background: #333; margin-top: 2px; border-radius: 2px; }
        .hp-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s; }
    </style>
</head>
<body>
    <div id="admin-ui">
        <div class="card full-width" style="display:flex; justify-content:space-between; align-items:center;">
            <div>
                <span style="margin-right:20px;">SEASON: <span id="seasonNum" class="status-tag">1</span></span>
                <span>ROUND: <span id="roundNum" class="status-tag">1</span></span>
            </div>
            <div>
                <button class="btn-master" style="background:var(--accent);" onclick="generateSeason()">GENERATE SEASON</button>
                <button class="btn-master" style="background:#555; color:white;" onclick="triggerTick()">TRIGGER DAILY TICK</button>
                <button class="btn-master" style="background:orange;" onclick="resetSeason()">RESET DISTANCE</button>
            </div>
        </div>

        <div class="card">
            <h3 style="color:var(--gold); margin-top:0;">ROUND STANDINGS</h3>
            <table id="rankTable">
                <thead><tr><th>Rank</th><th>Unit</th><th>Team</th><th>Dist</th></tr></thead>
                <tbody id="rankBody"></tbody>
            </table>
        </div>

        <div class="card">
            <h3>THE 7-DAY MATRIX</h3>
            <table>
                <thead><tr id="mat-head"><th>Detail</th></tr></thead>
                <tbody id="mat-body"></tbody>
            </table>
        </div>

        <div class="card full-width">
            <h3>LIVE TRACK MONITOR (2000m)</h3>
            <div class="track-box">
                <div class="marker-1000"></div>
                <div id="master-layer"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, update, onValue, get, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const icons = { straight:"➡️", right:"⤴️", left:"⤵️", flatland:"➖", uphill:"🔼", downhill:"🔽", dry:"☀️", wet:"🌧️" };

        // --- SEASON GENERATION WITH PENALTY LOGIC ---
        window.generateSeason = async () => {
            const sSnap = await get(ref(db, 'race_state'));
            const state = sSnap.val() || { season: 1, round: 1 };
            
            const directions = ["straight", "straight", "right", "left"];
            const elevations = ["flatland", "flatland", "uphill", "downhill"];
            
            const newConsts = {
                direction: Array.from({length: 7}, () => directions[Math.floor(Math.random()*4)]),
                elevation: Array.from({length: 7}, () => elevations[Math.floor(Math.random()*4)]),
                humidity: Array.from({length: 7}, () => Math.floor(Math.random()*101)),
                weather: []
            };

            // Round 2+ Penalty Logic
            if (state.round >= 2) {
                const carsSnap = await get(ref(db, 'cars'));
                const sortedCars = Object.values(carsSnap.val()).sort((a,b) => b.total_dist - a.total_dist);
                const winner = sortedCars[0];
                const runnerUp = sortedCars[1];

                // Winner Penalties (Day 1 & 3)
                [0, 2].forEach(dayIdx => {
                    newConsts.direction[dayIdx] = (winner.traits.propulsion <= 5) ? "straight" : (Math.random() > 0.5 ? "right" : "left");
                    newConsts.humidity[dayIdx] = (winner.traits.traction <= 5) ? 100 : 0;
                    newConsts.elevation[dayIdx] = (winner.traits.stability <= 5) ? (Math.random() > 0.5 ? "uphill" : "downhill") : "flatland";
                });

                // Runner-up Penalties (Day 2)
                if (runnerUp) {
                    newConsts.direction[1] = (runnerUp.traits.propulsion <= 5) ? "straight" : (Math.random() > 0.5 ? "right" : "left");
                    newConsts.humidity[1] = (runnerUp.traits.traction <= 5) ? 100 : 0;
                    newConsts.elevation[1] = (runnerUp.traits.stability <= 5) ? (Math.random() > 0.5 ? "uphill" : "downhill") : "flatland";
                }
            }

            // Weather Finalization
            for(let i=0; i<7; i++) {
                const hum = newConsts.humidity[i];
                newConsts.weather[i] = (hum <= 40) ? "dry" : (Math.random()*100 > hum ? "dry" : "wet");
            }

            await set(ref(db, 'race_constants'), newConsts);
            await update(ref(db, 'race_state'), { day_in_round: 1 });
            alert("New Season Matrix Generated with Penalties applied!");
        };

        // --- DAILY TICK WITH HP MECHANICS ---
        window.triggerTick = async () => {
            const [cSnap, carsSnap, sSnap] = await Promise.all([get(ref(db,'race_constants')), get(ref(db,'cars')), get(ref(db,'race_state'))]);
            const cars = carsSnap.val();
            const state = sSnap.val();
            const updates = {};

            Object.keys(cars).forEach(id => {
                const car = cars[id];
                const coreBonus = (car.traits.core * 2) / 20; // Simplified core impact
                
                if (car.role) { // Active Car
                    // Distance
                    updates[`cars/${id}/total_dist`] = (car.total_dist || 0) + (Math.random() * 150 + 50);
                    // HP Drain for Support
                    if (car.role === 'support') {
                        const drain = (Math.random() * (12 - 5) + 5) - coreBonus;
                        updates[`cars/${id}/hp`] = Math.max(0, (car.hp || 100) - drain);
                    }
                } else { // Resting Car
                    const heal = (Math.random() * (13 - 8) + 8) + coreBonus;
                    updates[`cars/${id}/hp`] = Math.min(100, (car.hp || 100) + heal);
                }
            });

            updates['race_state/day_in_round'] = (state.day_in_round >= 7) ? 1 : state.day_in_round + 1;
            if (state.day_in_round === 7) updates['race_state/round'] = (state.round || 1) + 1;

            await update(ref(db), updates);
        };

        // --- UI SYNC ---
        onValue(ref(db, 'cars'), snap => {
            const cars = snap.val() || {};
            const list = Object.values(cars).sort((a,b) => (b.total_dist || 0) - (a.total_dist || 0));
            
            // Standings
            document.getElementById('rankBody').innerHTML = list.slice(0, 10).map((c, i) => 
                `<tr><td>${i+1}</td><td>#${c.id}</td><td>${c.team}</td><td>${Math.round(c.total_dist || 0)}m</td></tr>`
            ).join('');

            // Track
            const layer = document.getElementById('master-layer');
            layer.innerHTML = '';
            list.forEach(c => {
                if (c.role && (c.hp || 100) > 0) {
                    const prog = Math.min((c.total_dist || 0) / 2000 * 100, 98);
                    const isLow = c.hp <= 15 ? 'low-hp' : '';
                    layer.innerHTML += `
                        <div class="track-lane">
                            <div class="track-car ${c.role} ${isLow}" style="left:${prog}%">
                                ${c.id}
                                <div class="hp-bar-bg"><div class="hp-fill" style="width:${c.hp || 100}%"></div></div>
                            </div>
                        </div>`;
                }
            });
        });

        onValue(ref(db, 'race_state'), s => {
            document.getElementById('seasonNum').innerText = s.val()?.season || 1;
            document.getElementById('roundNum').innerText = s.val()?.round || 1;
        });

        window.resetSeason = async () => {
            const carsSnap = await get(ref(db, 'cars'));
            const up = {};
            Object.keys(carsSnap.val()).forEach(k => { up[`cars/${k}/total_dist`] = 0; });
            await update(ref(db), up);
            alert("Distances cleared for the new round!");
        };
    </script>
</body>
</html>

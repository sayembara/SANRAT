<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Master Engine</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; --gold: #ffcc00; --danger: #ff4b2b; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: #0b0e14; color: white; display: flex; flex-direction: column; align-items: center; }
        #admin-ui { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 20px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; }
        .btn-master { padding: 12px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.8rem; text-align: center; }
        th, td { border: 1px solid #333; padding: 10px; }
        th { background: rgba(255,255,255,0.05); color: var(--accent); }
        .track-box { background: #000; height: 300px; position: relative; overflow-y: auto; border-radius: 10px; border: 1px solid #444; }
        .track-lane { position: relative; width: 100%; height: 28px; border-bottom: 1px solid #222; }
        .track-car { position: absolute; height: 18px; width: 32px; background: #444; border-radius: 3px; top: 5px; font-size: 0.55rem; color: black; font-weight: 900; text-align: center; line-height: 18px; transition: 1s linear; cursor: help; }
        .track-car.hero { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
        .track-car.support { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    </style>
</head>
<body>
    <div id="admin-ui">
        <div class="card">
            <h2 style="margin:0; color:var(--accent);">MASTER CONTROL ENGINE</h2>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-master" style="background:var(--accent); color:#00334e;" onclick="toggleRace(true)">GO LIVE</button>
                <button class="btn-master" style="background:var(--danger); color:white;" onclick="toggleRace(false)">STOP RACE</button>
                <button class="btn-master" style="background:#555; color:white;" onclick="triggerTick()">TRIGGER DAILY TICK</button>
            </div>
        </div>

        <div class="card">
            <h3>THE 7-DAY MATRIX</h3>
            <table>
                <thead><tr id="mat-head"><th>Day</th></tr></thead>
                <tbody id="mat-body">
                    <tr id="row-dir"><td><b>Direction</b></td></tr>
                    <tr id="row-elev"><td><b>Elevation</b></td></tr>
                    <tr id="row-hum"><td><b>Humidity %</b></td></tr>
                    <tr id="row-weather"><td><b>Weather</b></td></tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <h3>DISTRIBUTION</h3>
            <div style="display:flex; gap:10px;">
                <select id="targetTeam" style="flex:1; background:#000; color:white; border:1px solid #444; padding:10px;"><option value="Alpha">Alpha</option><option value="Beta">Beta</option><option value="Gamma">Gamma</option><option value="Delta">Delta</option><option value="Epsilon">Epsilon</option></select>
                <input type="number" id="distAmt" value="0.1" step="0.01" style="width:80px; background:#000; color:white; border:1px solid #444;">
                <button class="btn-master" style="background:var(--gold); color:black;" onclick="distribute()">TRANSFER FUND</button>
            </div>
        </div>

        <div class="card">
            <h3>MASTER TRACK (LIVE MONITOR)</h3>
            <div class="track-box"><div id="master-layer"></div></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, update, onValue, get, set } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const icons = { straight: "➡️", right: "⤴️", left: "⤵️", flat: "➖", up: "🔼", down: "🔽", dry: "☀️", wet: "🌧️" };

        onValue(ref(db, 'race_constants'), snap => {
            const c = snap.val();
            const head = document.getElementById('mat-head');
            const rDir = document.getElementById('row-dir');
            const rElev = document.getElementById('row-elev');
            const rHum = document.getElementById('row-hum');
            const rWeth = document.getElementById('row-weather');

            onValue(ref(db, 'race_state'), sSnap => {
                const curDay = sSnap.val()?.day_in_round || 1;
                head.innerHTML = '<th>Day</th>' + c.weather.map((_, i) => `<th style="${i+1===curDay?'background:var(--danger);':''}">Day ${i+1}</th>`).join('');
                rDir.innerHTML = '<td><b>Direction</b></td>' + c.direction.map(v => `<td>${icons[v]||v}</td>`).join('');
                rElev.innerHTML = '<td><b>Elevation</b></td>' + c.elevation.map(v => `<td>${icons[v]||v}</td>`).join('');
                rHum.innerHTML = '<td><b>Humidity %</b></td>' + c.humidity.map(v => `<td>${v}%</td>`).join('');
                
                rWeth.innerHTML = '<td><b>Weather</b></td>' + c.humidity.map((h, i) => {
                    if(i+1 < curDay) return `<td>${icons[c.weather[i]]||c.weather[i]}</td>`;
                    if(i+1 === curDay) {
                        const w = h <= 40 ? 'dry' : (Math.random()*100 > h ? 'dry' : 'wet');
                        return `<td style="color:var(--gold)">${icons[w]}</td>`;
                    }
                    return `<td>?</td>`;
                }).join('');
            });
        });

        onValue(ref(db, 'race_state/paid_teams'), paidSnap => {
            const paid = paidSnap.val() || {};
            onValue(ref(db, 'cars'), carSnap => {
                const layer = document.getElementById('master-layer');
                layer.innerHTML = '';
                Object.values(carSnap.val()).forEach(c => {
                    if(paid[c.team] && c.role) {
                        const p = (c.total_dist || 0) / 1500 * 100;
                        layer.innerHTML += `<div class="track-lane"><div class="track-car ${c.role}" style="left:${p}%" title="P:${c.traits.propulsion} T:${c.traits.traction}">${c.id}</div></div>`;
                    }
                });
            });
        });

        window.toggleRace = (live) => update(ref(db, 'master_state'), { isLive: live, label: live ? "RACING LIVE" : "OFFLINE" });
        window.distribute = async () => {
            const t = document.getElementById('targetTeam').value;
            const a = parseFloat(document.getElementById('distAmt').value);
            const s = await get(ref(db, `balances/${t}`));
            await set(ref(db, `balances/${t}`), (s.val()||0) + a);
            alert("Fund Distributed!");
        };

        window.triggerTick = async () => {
            if(!confirm("Execute daily calculation?")) return;
            // Full Engine logic remains same as previous provided but updated to next day
            const s = await get(ref(db, 'race_state'));
            const day = (s.val()?.day_in_round || 1);
            await update(ref(db, 'race_state'), { day_in_round: day >= 7 ? 1 : day + 1 });
            alert("Tick Complete!");
        };
    </script>
</body>
</html>

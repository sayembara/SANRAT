<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Admin Secure Access</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; --gold: #ffcc00; --danger: #ff4b2b; --bg: #0b0e14; }
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Login Overlay */
        #loginOverlay { text-align: center; z-index: 100; }
        .wallet-btn { background: #f6851b; color: white; border: none; padding: 20px 40px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 15px; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .wallet-btn:hover { transform: translateY(-3px); background: #e27613; }

        /* Main Content (Hidden by default) */
        #mainContent { display: none; width: 100%; max-width: 1200px; padding: 20px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        
        /* Layout Components */
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .track-box { background: #000; height: 300px; position: relative; border-radius: 10px; border: 1px solid #444; overflow: hidden; }
        .track-lane { position: relative; width: 100%; height: 35px; border-bottom: 1px solid #222; }
        .track-car { position: absolute; height: 20px; width: 35px; border-radius: 3px; top: 7px; font-size: 0.6rem; color: black; font-weight: 900; text-align: center; line-height: 20px; }
        .start-light { position: absolute; top: 15px; left: 20px; width: 25px; height: 25px; border-radius: 50%; border: 3px solid #333; }
        .light-red { background: #ff0000; box-shadow: 0 0 20px #ff0000; }
        .light-green { background: #00ff00; box-shadow: 0 0 20px #00ff00; }

        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        .tier-row { display: flex; gap: 8px; }
        .tier-row input { flex: 1; min-width: 0; text-align: center; }
        
        label { font-size: 0.7rem; color: #888; text-transform: uppercase; font-weight: bold; }
        input { background: #000; border: 1px solid #555; color: var(--accent); padding: 10px; border-radius: 4px; font-family: monospace; }
        .btn-update { background: var(--accent); color: #000; border: none; padding: 18px; border-radius: 8px; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <h1 style="color:var(--gold); margin-bottom: 30px;">SANRAT ADMIN ENGINE</h1>
        <button class="wallet-btn" onclick="connectAdminWallet()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Logo.svg" width="30"> 
            ADMIN LOGIN
        </button>
    </div>

    <div id="mainContent">
        <div class="header-nav">
            <div style="font-weight: bold;">
                SEASON <span id="seasonNum" style="color:var(--gold)">-</span> | 
                ROUND <span id="roundNum" style="color:var(--gold)">-</span>
            </div>
            <div id="statusLabel" style="color:var(--danger); font-weight:bold;">CONNECTING...</div>
        </div>

        <div class="card">
            <div class="track-box" id="master-layer">
                <div id="raceLight" class="start-light light-red"></div>
            </div>
        </div>

        <div class="config-grid">
            <div class="card">
                <h3>📅 CALENDAR</h3>
                <div class="input-group"><label>Rounds Per Season</label><input type="number" id="rounds_per_season"></div>
                <div class="input-group"><label>Days Per Round</label><input type="number" id="days_per_round"></div>
            </div>
            <div class="card">
                <h3>📐 GEOMETRY</h3>
                <div class="input-group"><label>Track Length (m)</label><input type="number" id="total_track_m"></div>
                <div class="input-group"><label>Finish Line (m)</label><input type="number" id="finish_m"></div>
            </div>
            <div class="card">
                <h3>🚦 RACE START</h3>
                <div class="input-group"><label>Min Cars to Start</label><input type="number" id="min_cars_start"></div>
                <div id="countLabel" style="font-size: 0.7rem; color: var(--accent);">Active Cars: 0</div>
            </div>
        </div>

        <div class="card">
            <h3>📊 TIER & POINT LOGIC</h3>
            <div class="config-grid">
                <div class="input-group">
                    <label>Tier 1 (Min/Max/Mult)</label>
                    <div class="tier-row"><input type="number" id="t1_min"><input type="number" id="t1_max"><input type="number" id="t1_mult" step="0.1"></div>
                </div>
                <div class="input-group">
                    <label>Tier 2 (Min/Max/Mult)</label>
                    <div class="tier-row"><input type="number" id="t2_min"><input type="number" id="t2_max"><input type="number" id="t2_mult" step="0.1"></div>
                </div>
                <div class="input-group">
                    <label>Tier 3 (Min/Max/Mult)</label>
                    <div class="tier-row"><input type="number" id="t3_min"><input type="number" id="t3_max"><input type="number" id="t3_mult" step="0.1"></div>
                </div>
            </div>
            <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:8px; margin-top:15px;">
                Points = <input type="number" id="base_pts" style="width:70px;"> * (<input type="number" id="decay_const" step="0.01" style="width:60px;">)<sup>(Pos-1)</sup>
            </div>
            <button class="btn-update" onclick="saveMasterConfig()">💾 SYNC GLOBAL CONFIGURATION</button>
        </div>
    </div>

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- PASTE YOUR WALLET HERE ---
        const ADMIN_WALLET = "0xCe9782f77eC560a1Cb329F935b5D416AA41f1a5d".toLowerCase(); 

        window.connectAdminWallet = async () => {
            if (!window.ethereum) return alert("Please install MetaMask!");
            
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accounts[0].toLowerCase() === ADMIN_WALLET) {
                    // Unlock UI
                    document.body.style.alignItems = "flex-start";
                    document.getElementById('loginOverlay').style.display = "none";
                    document.getElementById('mainContent').style.display = "block";
                    
                    startLiveSync();
                    loadInputs();
                } else {
                    alert("Unauthorized wallet. Access denied.");
                }
            } catch (err) { alert("Login failed."); }
        };

        async function loadInputs() {
            const snap = await get(ref(db, 'season_config'));
            const cfg = snap.val();
            if(!cfg) return;

            // Explicitly set every input from Firebase
            document.getElementById('rounds_per_season').value = cfg.max_rounds || 20;
            document.getElementById('days_per_round').value = cfg.days_per_round || 7;
            document.getElementById('total_track_m').value = cfg.track_len || 1500;
            document.getElementById('finish_m').value = cfg.finish_m || 1000;
            document.getElementById('min_cars_start').value = cfg.min_cars_to_start || 10;
            document.getElementById('t1_min').value = cfg.tiers.t1.min;
            document.getElementById('t1_max').value = cfg.tiers.t1.max;
            document.getElementById('t1_mult').value = cfg.tiers.t1.mult;
            document.getElementById('t2_min').value = cfg.tiers.t2.min;
            document.getElementById('t2_max').value = cfg.tiers.t2.max;
            document.getElementById('t2_mult').value = cfg.tiers.t2.mult;
            document.getElementById('t3_min').value = cfg.tiers.t3.min;
            document.getElementById('t3_max').value = cfg.tiers.t3.max;
            document.getElementById('t3_mult').value = cfg.tiers.t3.mult;
            document.getElementById('base_pts').value = cfg.points.base;
            document.getElementById('decay_const').value = cfg.points.decay;
        }

            onValue(ref(db, '/'), snap => {
                const data = snap.val();
                const s = data.race_state || { season:1, round:1, day_in_round:1 };
                const cfg = data.season_config || {};
                const cars = Object.values(data.cars || {}).filter(c => c.role === 'support');
                
                document.getElementById('seasonNum').innerText = s.season;
                document.getElementById('roundNum').innerText = s.round;
                document.getElementById('countLabel').innerText = `Active Cars: ${cars.length}`;

                document.getElementById('statusLabel').innerText = s.day_in_round > maxD ? `END OF DAY ${maxD}` : `DAY ${s.day_in_round}`;

                renderTrack(cfg.track_len || 1500, cfg.finish_m || 1000, data.cars);
            });
        }

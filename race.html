<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Race Engine Control</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; --gold: #ffcc00; --danger: #ff4b2b; --bg: #0b0e14; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: var(--bg); color: white; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-nav { background: #333; color: white; border: 1px solid #444; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }

        .track-box { background: #000; height: 350px; position: relative; border-radius: 10px; border: 1px solid #444; overflow: hidden; }
        .track-lane { position: relative; width: 100%; height: 35px; border-bottom: 1px solid #222; }
        .track-car { position: absolute; height: 20px; width: 35px; border-radius: 3px; top: 7px; font-size: 0.6rem; color: black; font-weight: 900; text-align: center; line-height: 20px; transition: left 0.8s linear; z-index: 2; }
        .finish-marker { position: absolute; top: 0; bottom: 0; width: 2px; border-left: 2px dashed var(--danger); z-index: 1; }

        .config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .tier-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        label { font-size: 0.7rem; color: #888; text-transform: uppercase; font-weight: bold; }
        input { background: #000; border: 1px solid #555; color: var(--accent); padding: 8px; border-radius: 4px; font-family: monospace; }
        
        .formula-box { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; border-left: 4px solid var(--gold); margin-top: 15px; }
        .btn-update { background: var(--accent); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; margin-top: 20px; width: 100%; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header-nav">
        <div>
            SEASON <span id="seasonNum" style="color:var(--gold)">1</span> | 
            ROUND <span id="roundNum" style="color:var(--gold)">1</span>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-nav" onclick="window.location.href='race_constants.html'">⚙️ ENGINE</button>
            <button class="btn-nav" onclick="window.location.href='ranking_prize.html'">🏆 PRIZES</button>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="margin:0;">LIVE RACE TRACK</h2>
            <span id="dayLabel" style="color:var(--danger); font-weight:bold;">DAY 1</span>
        </div>
        <div class="track-box" id="master-layer"></div>
    </div>

    <div class="card">
        <h3>CALENDAR & GEOMETRY</h3>
        <div class="config-grid">
            <div class="input-group"><label>Rounds Per Season</label><input type="number" id="rounds_per_season" value="20"></div>
            <div class="input-group"><label>Days Per Round</label><input type="number" id="days_per_round" value="7"></div>
            <div class="input-group"><label>Total Track Length (m)</label><input type="number" id="total_track_m" value="1500"></div>
            <div class="input-group"><label>Finish Line Marker (m)</label><input type="number" id="finish_m" value="1000"></div>
        </div>
    </div>

    <div class="card">
        <h3>TIER & POINT LOGIC</h3>
        <div class="config-grid">
            <div class="input-group">
                <label>Tier 1 (Min-Max | Mult)</label>
                <div class="tier-row">
                    <input type="number" id="t1_min" value="1">
                    <input type="number" id="t1_max" value="60">
                    <input type="number" id="t1_mult" step="0.1" value="0.5">
                </div>
            </div>
            <div class="input-group">
                <label>Tier 2 (Min-Max | Mult)</label>
                <div class="tier-row">
                    <input type="number" id="t2_min" value="61">
                    <input type="number" id="t2_max" value="200">
                    <input type="number" id="t2_mult" step="0.1" value="1.0">
                </div>
            </div>
            <div class="input-group">
                <label>Tier 3 (Min-Max | Mult)</label>
                <div class="tier-row">
                    <input type="number" id="t3_min" value="201">
                    <input type="number" id="t3_max" value="9999">
                    <input type="number" id="t3_mult" step="0.1" value="1.5">
                </div>
            </div>
        </div>

        <div class="formula-box">
            <strong>Global Formula:</strong><br>
            Points = <input type="number" id="base_pts" value="1000" style="width:70px;"> * (<input type="number" id="decay_const" step="0.01" value="0.95" style="width:60px;">)<sup>(Pos-1)</sup> * [Tier Mult]
        </div>

        <button class="btn-update" onclick="saveMasterConfig()">💾 SYNC GLOBAL CONFIGURATION</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // SYNC UI
        onValue(ref(db, '/'), snap => {
            const data = snap.val();
            const s = data.race_state || { season:1, round:1, day_in_round:1 };
            const cfg = data.season_config || {};
            
            document.getElementById('seasonNum').innerText = s.season;
            document.getElementById('roundNum').innerText = s.round;
            document.getElementById('dayLabel').innerText = `DAY ${s.day_in_round}`;
            
            renderTrack(cfg.track_len || 1500, cfg.finish_m || 1000, data.cars);
        });

        function renderTrack(maxM, finishM, carData) {
            const layer = document.getElementById('master-layer');
            layer.innerHTML = '';
            const finishPct = (finishM / maxM) * 100;
            layer.innerHTML += `<div class="finish-marker" style="left: ${finishPct}%"></div>`;

            const cars = Object.values(carData || {}).filter(c => c.role === 'support');
            cars.forEach(c => {
                const p = Math.min(((c.total_dist || 0) / maxM) * 100, 98);
                layer.innerHTML += `<div class="track-lane"><div class="track-car" style="left:${p}%; background:#00ffcc">${c.id}</div></div>`;
            });
        }

        window.saveMasterConfig = async () => {
            const config = {
                max_rounds: parseInt(document.getElementById('rounds_per_season').value),
                days_per_round: parseInt(document.getElementById('days_per_round').value),
                track_len: parseInt(document.getElementById('total_track_m').value),
                finish_m: parseInt(document.getElementById('finish_m').value),
                tiers: {
                    t1: { min: parseInt(document.getElementById('t1_min').value), max: parseInt(document.getElementById('t1_max').value), mult: parseFloat(document.getElementById('t1_mult').value) },
                    t2: { min: parseInt(document.getElementById('t2_min').value), max: parseInt(document.getElementById('t2_max').value), mult: parseFloat(document.getElementById('t2_mult').value) },
                    t3: { min: parseInt(document.getElementById('t3_min').value), max: parseInt(document.getElementById('t3_max').value), mult: parseFloat(document.getElementById('t3_mult').value) }
                },
                points: {
                    base: parseInt(document.getElementById('base_pts').value),
                    decay: parseFloat(document.getElementById('decay_const').value)
                }
            };
            await update(ref(db, 'season_config'), config);
            alert("Master Season Configuration Updated!");
        };
    </script>
</body>
</html>

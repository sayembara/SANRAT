<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Race Constants Configuration</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0e14; color: white; padding: 40px; }
        .config-container { max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid #333; }
        .group { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #222; }
        label { display: block; margin-bottom: 10px; color: #00ffcc; font-weight: bold; }
        .input-row { display: flex; gap: 10px; align-items: center; }
        input { background: #000; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; width: 80px; }
        button { background: #00ffcc; color: #0b0e14; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #00cca3; }
        .desc { font-size: 0.8rem; color: #888; margin-top: 8px; }
    </style>
</head>
<body>

<div class="config-container">
    <h1>Global Physics Config</h1>
    
    <div class="group">
        <label>Support HP Drain Range (%)</label>
        <div class="input-row">
            <span>Min:</span> <input type="number" id="drainMin" step="0.1">
            <span>Max:</span> <input type="number" id="drainMax" step="0.1">
            <button onclick="save('drain')">Save Drain</button>
        </div>
        <p class="desc">Formula: Random(Min, Max) - (Core/20). Default: 5% - 12%</p>
    </div>

    <div class="group">
        <label>Resting HP Heal Range (%)</label>
        <div class="input-row">
            <span>Min:</span> <input type="number" id="healMin" step="0.1">
            <span>Max:</span> <input type="number" id="healMax" step="0.1">
            <button onclick="save('heal')">Save Heal</button>
        </div>
        <p class="desc">Formula: Random(Min, Max) + (Core/20). Default: 8% - 13%</p>
    </div>

    <button style="background: #ff4b2b; color: white; width: 100%;" onclick="window.location.href='master.html'">Back to Master Page</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getDatabase, ref, update, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", 
        databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Load current values
    onValue(ref(db, 'race_constants/hp_settings'), snap => {
        const data = snap.val();
        if (data) {
            if (data.drain) {
                document.getElementById('drainMin').value = data.drain.min;
                document.getElementById('drainMax').value = data.drain.max;
            }
            if (data.heal) {
                document.getElementById('healMin').value = data.heal.min;
                document.getElementById('healMax').value = data.heal.max;
            }
        }
    });

    window.save = async (type) => {
        const min = parseFloat(document.getElementById(`${type}Min`).value);
        const max = parseFloat(document.getElementById(`${type}Max`).value);
        
        const updates = {};
        updates[`race_constants/hp_settings/${type}`] = { min, max };
        
        await update(ref(db), updates);
        alert(`${type.toUpperCase()} settings updated!`);
    };
</script>

</body>
</html>

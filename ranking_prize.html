<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Ranking & Prize Setup</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; --gold: #ffcc00; --bg: #0b0e14; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1000px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 25px; margin-bottom: 20px; }
        .grid-config { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        input { background: #000; border: 1px solid #444; color: var(--accent); padding: 10px; border-radius: 5px; }
        .btn-save { background: var(--accent); color: #000; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        .highlight-val { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚙️ Season Ranking & Prize Setup</h1>

        <div class="card">
            <h2>Live Funding Data</h2>
            <div class="grid-config">
                <div class="input-group">
                    <label>Sponsor Pool (BNB)</label>
                    <input type="number" id="sponsor_pool" readonly value="0.00">
                </div>
                <div class="input-group">
                    <label>Funding Pool (BNB)</label>
                    <input type="number" id="funding_pool" readonly value="0.00">
                </div>
                <div class="input-group">
                    <label>Total Combined Pool</label>
                    <div id="total_display" class="highlight-val" style="font-size: 1.5rem;">0.00 BNB</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Tiering & Points</h2>
            <div class="grid-config">
                <div class="input-group">
                    <label>Base Points (P1)</label>
                    <input type="number" id="base_points" value="1000">
                </div>
                <div class="input-group">
                    <label>Decay Multiplier</label>
                    <input type="number" id="decay_rate" step="0.01" value="0.95">
                </div>
                <div class="input-group">
                    <label>Promotion Window (Rounds)</label>
                    <input type="number" id="promo_window" value="5">
                </div>
                <div class="input-group">
                    <label>Carryover %</label>
                    <input type="number" id="carry_pct" value="50">
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Prize Distribution (%)</h2>
            <div class="grid-config">
                <div class="input-group"><label>Podium (1-3)</label><input type="number" class="pct" data-key="podium" value="55"></div>
                <div class="input-group"><label>Top 10</label><input type="number" class="pct" data-key="top10" value="15"></div>
                <div class="input-group"><label>Weekly</label><input type="number" class="pct" data-key="weekly" value="10"></div>
                <div class="input-group"><label>Constructor</label><input type="number" class="pct" data-key="constructor" value="10"></div>
                <div class="input-group"><label>Bonus/Fastest</label><input type="number" class="pct" data-key="bonus" value="10"></div>
            </div>
        </div>

        <button class="btn-save" onclick="saveSeasonConfig()">💾 SYNC CONFIG & START ROUND</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Fetch Live Pool Data from other pages
        onValue(ref(db, 'funding_data'), (snap) => {
            const data = snap.val() || { sponsor: 0, player_funding: 0 };
            document.getElementById('sponsor_pool').value = data.sponsor;
            document.getElementById('funding_pool').value = data.player_funding;
            const total = parseFloat(data.sponsor) + parseFloat(data.player_funding);
            document.getElementById('total_display').innerText = total.toFixed(2) + " BNB";
        });

        window.saveSeasonConfig = async () => {
            const pcts = {};
            document.querySelectorAll('.pct').forEach(el => pcts[el.dataset.key] = parseInt(el.value));
            
            const config = {
                points: {
                    base: parseInt(document.getElementById('base_points').value),
                    decay: parseFloat(document.getElementById('decay_rate').value)
                },
                rules: {
                    promo_round: parseInt(document.getElementById('promo_window').value),
                    carryover: parseInt(document.getElementById('carry_pct').value) / 100
                },
                allocation: pcts
            };

            await update(ref(db, 'season_config'), config);
            alert("Season logic synced to Master Engine.");
        };
    </script>
</body>
</html>

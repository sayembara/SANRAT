<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SANRAT | Secure Sponsor Control</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.08); --accent: #00ffcc; --danger: #ff4b2b; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: #0f0c29; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Auth Screen */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; text-align: center; }
        .btn-connect { background: #f6851b; color: white; padding: 15px 30px; font-size: 1.2rem; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; }
        
        /* Main UI */
        #admin-ui { display: none; width: 100%; max-width: 900px; flex-direction: column; align-items: center; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; margin-bottom: 20px; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; text-align: center; }
        input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); padding: 10px; border-radius: 8px; color: white; width: 80px; text-align: center; }
        
        button { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; width: 100%; }
        .btn-set { background: #fff; color: #000; width: auto; margin-left: 5px; }
        .btn-reallocate { background: var(--accent); color: #00334e; font-size: 1.1rem; }
        .btn-wipe { background: transparent; border: 2px solid var(--danger); color: var(--danger); margin-top: 30px; max-width: 400px; }

        .sensor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 100%; margin-top: 20px; }
        .sensor-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; text-align: center; }
        .active-round { border: 2px solid var(--accent); background: rgba(0, 255, 204, 0.1); }
        .past-round { opacity: 0.3; filter: grayscale(1); }
        .total-label { font-size: 1.1rem; color: var(--accent); font-weight: bold; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 4px; padding-top: 4px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1>SPONSOR GATEWAY</h1>
        <button class="btn-connect" id="connectBtn">Connect MetaMask</button>
        <p id="auth-error" style="color: var(--danger); margin-top: 20px;"></p>
    </div>

    <div id="admin-ui">
        <h1>SPONSOR COMMAND CENTER</h1>
        <div class="container">
            <div class="card">
                <h3>SET LIMITS</h3>
                <div>Min: <input type="number" id="minIn" step="0.1"> <button class="btn-set" id="btnMin">SET</button></div>
                <div style="margin-top:10px;">Max: <input type="number" id="maxIn" step="0.1"> <button class="btn-set" id="btnMax">SET</button></div>
                <p id="curLimits" style="font-size: 0.7rem; color:#888; margin-top:10px;"></p>
            </div>
            <div class="card">
                <h3>VAULT OVERFLOW</h3>
                <div style="font-size: 2.2rem; color: #ffcc00; font-family: monospace;" id="disp-overflow">0.000</div>
                <button class="btn-reallocate" id="btnReallocate">REALLOCATE FUNDS</button>
            </div>
        </div>
        <div class="sensor-grid" id="sensorGrid"></div>
        <button class="btn-wipe" id="btnWipe">🚨 WIPE ALL ROUNDS</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, set, get } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const WHITELISTED_ADMIN = "0xCe9782f77eC560a1Cb329F935b5D416AA41f1a5d".toLowerCase(); 
        const firebaseConfig = { apiKey: "AlzaSyBYxLOGFzaHN6CS4ro_bjnKEblbQE6Vtx4", databaseURL: "https://nuclearf1-94a6b-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('connectBtn').onclick = async () => {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                if (accounts[0].toLowerCase() === WHITELISTED_ADMIN) {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('admin-ui').style.display = 'flex';
                    setupAdminActions();
                } else { document.getElementById('auth-error').innerText = "Not authorized."; }
            }
        };

        function setupAdminActions() {
            // Real-time listener for UI
            onValue(ref(db), (snap) => {
                const data = snap.val() || {};
                const vault = data.vault || {};
                const limits = data.master_settings?.limits || { min: 0.1, max: 2.0 };
                const curRound = data.race_data?.current_round || 1;
                
                document.getElementById('curLimits').innerText = `CURRENT: MIN ${limits.min} | MAX ${limits.max}`;
                document.getElementById('disp-overflow').innerText = parseFloat(vault.overflow || 0).toFixed(3);
                
                const grid = document.getElementById('sensorGrid');
                grid.innerHTML = '';
                for(let i=1; i<=12; i++) {
                    let r = vault.rounds?.[`r${i}`] || { normal: 0, boost: 0 };
                    let extraClass = i < curRound ? 'past-round' : (i === curRound ? 'active-round' : '');
                    grid.innerHTML += `<div class="sensor-box ${extraClass}">
                        <div style="font-size:0.7rem;color:#aaa;">RD ${i}</div>
                        <div style="font-size:0.7rem; color:#666;">N: ${parseFloat(r.normal||0).toFixed(2)} | B: ${parseFloat(r.boost||0).toFixed(2)}</div>
                        <div class="total-label">${(parseFloat(r.normal||0)+parseFloat(r.boost||0)).toFixed(3)}</div>
                    </div>`;
                }
            });

            // Button Logic
            document.getElementById('btnMin').onclick = () => update(ref(db, 'master_settings/limits'), { min: parseFloat(document.getElementById('minIn').value) });
            document.getElementById('btnMax').onclick = () => update(ref(db, 'master_settings/limits'), { max: parseFloat(document.getElementById('maxIn').value) });

            document.getElementById('btnReallocate').onclick = async () => {
                const snap = await get(ref(db));
                const data = snap.val() || {};
                const limits = data.master_settings?.limits || { min: 0.1, max: 2.0 };
                let overflow = parseFloat(data.vault?.overflow || 0);
                let rounds = data.vault?.rounds || {};

                for(let i=1; i<=12; i++) {
                    if(!rounds[`r${i}`] || typeof rounds[`r${i}`] === 'number') rounds[`r${i}`] = { normal: 0, boost: 0 };
                    let curN = rounds[`r${i}`].normal;
                    if(curN > limits.max) {
                        overflow += (curN - limits.max);
                        rounds[`r${i}`].normal = limits.max;
                    } else if(curN < limits.max && overflow > 0) {
                        let fill = Math.min(overflow, limits.max - curN);
                        rounds[`r${i}`].normal = parseFloat((curN + fill).toFixed(3));
                        overflow -= fill;
                    }
                }
                update(ref(db, 'vault'), { rounds, overflow: parseFloat(overflow.toFixed(3)) }).then(() => alert("Reallocated!"));
            };

            document.getElementById('btnWipe').onclick = () => {
                if(!confirm("Wipe everything?")) return;
                const fresh = { overflow: 0, rounds: {} };
                for(let i=1; i<=12; i++) fresh.rounds[`r${i}`] = { normal: 0, boost: 0 };
                set(ref(db, 'vault'), fresh);
            };
        }
    </script>
</body>
</html>
